site:
  name: "Bank of America - Statements"
  id: "bofa_statements"
  login_url: "https://www.bankofamerica.com/"
  base_url: "https://www.bankofamerica.com"

credentials:
  provider: "env"
  env:
    username_var: "BOFA_USERNAME"
    password_var: "BOFA_PASSWORD"

auth:
  steps:
    - action: "fill"
      target:
        type: "id"
        value: "oid"
      input: "{username}"
      description: "Enter User ID"

    - action: "fill"
      target:
        type: "id"
        value: "pass"
      input: "{password}"
      description: "Enter Password"

    - action: "click"
      target:
        type: "id"
        value: "secure-signin-submit"
      description: "Click Log in"

    - action: "wait"
      wait_ms: 5000
      description: "Wait for MFA page to load"

  mfa:
    type: "sms"
    wait_seconds: 120

    pre_code_steps:
      - action: "click"
        target:
          type: "id"
          value: "ah-authcode-select-continue-btn"
        description: "Click Next to send authorization code"
      - action: "wait"
        wait_ms: 3000
        description: "Wait for code entry page"

    code_input_target:
      type: "id"
      value: "ahAuthcodeValidateOTP"

    remember_device_target:
      type: "id"
      value: "rememberDevice"

    submit_target:
      type: "id"
      value: "ah-authcode-validate-continue-btn"

  verify:
    - action: "wait_for_selector"
      target:
        type: "text"
        value: "Hello, Sean"
      timeout_seconds: 30
      description: "Wait for accounts page to load"

navigation:
  steps:
    # Go to accounts overview
    - action: "goto"
      target:
        type: "css"
        value: "https://secure.bankofamerica.com/myaccounts/brain/redirect.go?source=overview"
      description: "Navigate to accounts overview"
      wait_after: 5000

    # Click on Main Checking account
    - action: "click"
      target:
        type: "css"
        value: "a[name='DDA_details']"
      description: "Navigate to checking account details"
      wait_after: 5000

    # Click Statements & Documents tab
    - action: "click"
      target:
        type: "id"
        value: "tab-statementsdocs"
      description: "Navigate to statements page"
      wait_after: 8000

extraction:
  mode: "pdf_download"
  pdf:
    # These links have text like "Download PDF For March Statement For Main Checking"
    download_links_selector: "a[href='#']"
    download_directory: "./output/{site_id}/"
    # Only download links with "Download PDF" in the text (skip View PDF, Request, etc.)
    link_text_filter: "Download PDF.*Statement"
    download_timeout_seconds: 30

output:
  format: "csv"
  directory: "./output/{site_id}/"
  filename_template: "{site_id}_{date_pulled}.csv"
  columns: ["filename", "link_text", "size_bytes"]

session:
  # Reuse the same session as checking transactions
  storage_state_path: "./sessions/bofa_checking_state.json"
  reuse_session: true
  session_ttl_hours: 12

diagnostics:
  screenshot_on_failure: true
  capture_accessibility_tree: true
  output_directory: "./failures/{site_id}/"
