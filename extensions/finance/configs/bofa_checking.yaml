site:
  name: "Bank of America - Checking"
  id: "bofa_checking"
  login_url: "https://www.bankofamerica.com/"
  base_url: "https://www.bankofamerica.com"

credentials:
  provider: "env"
  env:
    username_var: "BOFA_USERNAME"
    password_var: "BOFA_PASSWORD"
    extra_vars:
      card_pin: "BOFA_ATM_PIN"

auth:
  steps:
    - action: "fill"
      target:
        type: "id"
        value: "oid"
      input: "{username}"
      description: "Enter User ID"

    - action: "fill"
      target:
        type: "id"
        value: "pass"
      input: "{password}"
      description: "Enter Password"

    - action: "click"
      target:
        type: "id"
        value: "secure-signin-submit"
      description: "Click Log in"

    - action: "wait"
      wait_ms: 5000
      description: "Wait for MFA page to load"

  mfa:
    # Email-MFA path: BofA delivers code to monarch508@gmail.com when the user
    # clicks "Get code a different way" on the method-select page. The
    # framework polls Gmail via the Gmail API, extracts the code, and fills it.
    # The email path triggers an additional ATM-card-and-PIN step-up; we
    # handle that with post_code_steps.
    type: "email"
    wait_seconds: 120

    pre_code_steps:
      # Switch delivery from default SMS to email. Multiple elements carry
      # this text (the real link plus hidden help-panel labels), so target
      # by ARIA role to disambiguate to the <a> link.
      - action: "click"
        target:
          type: "role"
          value: "Get code a different way"
          role: "link"
        description: "Switch MFA delivery to email"
      - action: "wait"
        wait_ms: 2500
        description: "Wait for delivery toggle to settle"
      # Click Next to dispatch the email
      - action: "click"
        target:
          type: "id"
          value: "ah-authcode-select-continue-btn"
        description: "Click Next to send authorization code via email"
      - action: "wait"
        wait_ms: 3000
        description: "Wait for code entry page"

    # BofA uses multiple sender addresses for these MFA codes (observed:
    # `onlinebanking_ealerts@bankofamerica.com` and
    # `onlinebanking@ealerts.bankofamerica.com`). Filter on the parent domain
    # to catch both; the subject filter narrows to MFA codes.
    email_sender_filter: "bankofamerica.com"
    email_subject_filter: "authorization code"
    email_body_regex: '(?<!\d)(\d{6})(?!\d)'
    email_timeout_seconds: 300

    code_input_target:
      type: "id"
      value: "ahAuthcodeValidateOTP"

    # Step-up: after the code is filled BofA also requires picking an ATM card
    # and entering its PIN before Submit will accept. The auth-code field is
    # also type=password (masked), so the PIN field needs its real ID rather
    # than a generic [type='password'] selector.
    post_code_steps:
      - action: "click"
        target:
          type: "css"
          value: "input[type='radio']"
        description: "Select ATM/debit card (only option)"
      - action: "wait"
        wait_ms: 800
        description: "Settle after card selection"
      - action: "fill"
        target:
          type: "id"
          value: "ahAuthcodeValidatePIN"
        input: "{card_pin}"
        description: "Enter ATM/debit PIN"

    submit_target:
      type: "id"
      value: "ah-authcode-validate-continue-btn"

  verify:
    - action: "wait_for_selector"
      target:
        type: "text"
        value: "Hello, Sean"
      timeout_seconds: 30
      description: "Wait for accounts page to load"

navigation:
  steps:
    # Go directly to the account activity page for checking
    # The adx parameter is account-specific; we use the overview redirect first
    - action: "goto"
      target:
        type: "css"
        value: "https://secure.bankofamerica.com/myaccounts/brain/redirect.go?source=overview"
      description: "Navigate to accounts overview"
      wait_after: 5000

    # Click on Main Checking account link
    - action: "click"
      target:
        type: "css"
        value: "a[name='DDA_details']"
      description: "Navigate to checking account details"
      wait_after: 8000

    # Wait for the transaction table to load
    - action: "wait_for_selector"
      target:
        type: "id"
        value: "txn-activity-table"
      timeout_seconds: 15
      description: "Wait for transaction table"

extraction:
  mode: "table"
  table:
    container:
      type: "id"
      value: "txn-activity-table"
    row_selector: "tbody tr.activity-row"
    columns:
      - name: "date"
        selector: "td.date-cell"
      - name: "description"
        selector: "td.desc-cell .desc-text"
      - name: "type"
        selector: "td.type-cell"
      - name: "amount"
        selector: "td.amount-cell"
        transform: "parse_currency"

output:
  format: "csv"
  directory: "./output/{site_id}/"
  filename_template: "{site_id}_{date_pulled}.csv"
  columns: ["date", "description", "type", "amount", "account", "source"]
  static_fields:
    account: "Main Checking (5844)"
    source: "bofa_checking"

session:
  storage_state_path: "./sessions/{site_id}_state.json"
  reuse_session: true
  session_ttl_hours: 12
  keepalive_url: "https://secure.bankofamerica.com/myaccounts/brain/redirect.go?source=overview"

diagnostics:
  screenshot_on_failure: true
  capture_accessibility_tree: true
  output_directory: "./failures/{site_id}/"
